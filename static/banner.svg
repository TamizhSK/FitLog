<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#c2570a;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c2570a;stop-opacity:0" />
    </radialGradient>
    <clipPath id="roundedCorners">
      <rect x="90" y="100" width="100" height="100" rx="20"/>
    </clipPath>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <circle cx="140" cy="150" r="120" fill="url(#glow)"/>
  
  <rect x="90" y="100" width="100" height="100" rx="20" fill="#27272a"/>
  
  <image x="90" y="100" width="100" height="100" clip-path="url(#roundedCorners)" href="data:image/png;base64,"/>
  
  <rect x="90" y="100" width="100" height="100" rx="20" fill="none" stroke="rgba(194,87,10,0.3)" stroke-width="1"/>
  
  <text x="230" y="145" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" fill="#fafafa" letter-spacing="-0.02em">FitLog</text>
  
  <text x="230" y="180" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="400" fill="#a1a1aa">Your gym notebook, digitized.</text>
  
  <g font-family="SF Mono, Monaco, Consolas, monospace" font-size="13" fill="#71717a">
    <text x="230" y="215"><tspan fill="#c2570a">▸</tspan> Zero backend</text>
    <text x="380" y="215"><tspan fill="#c2570a">▸</tspan> Zero cost</text>
    <text x="500" y="215"><tspan fill="#c2570a">▸</tspan> Zero friction</text>
    <text x="650" y="215"><tspan fill="#c2570a">▸</tspan> PWA ready</text>
  </g>
  
  <g transform="translate(230, 235)">
    <rect width="90" height="24" rx="4" fill="rgba(255,62,0,0.1)" stroke="rgba(255,62,0,0.3)" stroke-width="1"/>
    <text x="45" y="16" font-family="SF Mono, monospace" font-size="11" font-weight="500" fill="#ff3e00" text-anchor="middle">SvelteKit</text>
    <rect x="100" width="90" height="24" rx="4" fill="rgba(49,120,198,0.1)" stroke="rgba(49,120,198,0.3)" stroke-width="1"/>
    <text x="145" y="16" font-family="SF Mono, monospace" font-size="11" font-weight="500" fill="#3178c6" text-anchor="middle">TypeScript</text>
    <rect x="200" width="85" height="24" rx="4" fill="rgba(194,87,10,0.1)" stroke="rgba(194,87,10,0.3)" stroke-width="1"/>
    <text x="242.5" y="16" font-family="SF Mono, monospace" font-size="11" font-weight="500" fill="#c2570a" text-anchor="middle">IndexedDB</text>
    <rect x="295" width="85" height="24" rx="4" fill="rgba(83,148,255,0.1)" stroke="rgba(83,148,255,0.3)" stroke-width="1"/>
    <text x="337.5" y="16" font-family="SF Mono, monospace" font-size="11" font-weight="500" fill="#5394ff" text-anchor="middle">Capacitor</text>
  </g>
  
  <line x1="0" y1="0" x2="60" y2="0" stroke="#c2570a" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#c2570a" stroke-width="2" opacity="0.5"/>
  <line x1="1200" y1="300" x2="1140" y2="300" stroke="#c2570a" stroke-width="2" opacity="0.5"/>
  <line x1="1200" y1="300" x2="1200" y2="240" stroke="#c2570a" stroke-width="2" opacity="0.5"/>
</svg>
